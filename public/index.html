<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DockGate Control Panel</title>
  <meta name="description" content="DockGate — A lightweight, browser-based Docker control panel for managing containers, images, volumes, networks, and more.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐳</text></svg>">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
</head>
<body>
  <div id="app" class="mac-layout">
    
    <aside class="mac-sidebar" id="sidebar">
      <div class="mac-sidebar-header">
        <div class="mac-logo">🐳</div>
        <div class="mac-brand">
          <div class="mac-brand-title">DockGate</div>
          <div class="mac-brand-sub">Control</div>
        </div>
      </div>
      <nav class="mac-sidebar-nav" id="sidebar-nav"></nav>
      <div class="mac-sidebar-footer">
        <div class="mac-version">v1.0.0</div>
      </div>
    </aside>

    <div class="mac-main-wrapper">
      <header class="mac-header" id="header">
        <div class="mac-header-left">
          <h1 class="header-title" id="header-title">Dashboard</h1>
        </div>
        <div class="mac-header-right">
          <div class="header-search" id="global-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="search-input" placeholder="Search containers, images...">
          </div>
          <div class="connection-status" id="connection-status">
            <span class="connection-dot"></span>
            <span id="connection-text">Connected</span>
          </div>
        </div>
      </header>
      
      <main class="content" id="content"></main>
    </div>
    
  </div>
  <div class="toast-container" id="toast-container"></div>
  <div id="modal-root"></div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/containers.js"></script>
  <script src="/js/pages/container-detail.js"></script>
  <script src="/js/pages/images.js"></script>
  <script src="/js/pages/builds.js"></script>
  <script src="/js/pages/volumes.js"></script>
  <script src="/js/pages/networks.js"></script>
  <script src="/js/pages/compose.js"></script>
  <script src="/js/pages/logs.js"></script>
  <script src="/js/pages/terminal.js"></script>
  <script src="/js/pages/events.js"></script>
  <script src="/js/pages/system.js"></script>
  <script src="/js/pages/cleanup.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
